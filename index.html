<!DOCTYPE html>
<html lang="th">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d353;
  --radius:8px;--shadow:0 8px 24px rgba(0,0,0,.4);
}
body.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f6f8fa;--bg4:#d0d7de;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#848d97;
  --blue:#0969da;--blue2:#0550ae;--green:#1a7f37;--red:#cf222e;
  --yellow:#9a6700;--purple:#8250df;--orange:#bc4c00;
  --shadow:0 8px 24px rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--blue2);color:#fff;}
.btn-primary:hover{background:#388bfd;}
.btn-danger{background:#da3633;color:#fff;}
.btn-danger:hover{background:#f85149;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-green{background:#238636;color:#fff;}
.btn-green:hover{background:#2ea043;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select option{background:var(--bg3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-bd{padding:20px;}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:var(--bg3);padding:10px 12px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.clickable{cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;}
/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-nav{flex:1;padding:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;color:var(--text2);font-size:14px;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:#1f6feb22;color:var(--blue);border-left:3px solid var(--blue);}
.main-content{margin-left:220px;min-height:100vh;}
/* Bottom Nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text2);font-size:11px;gap:2px;}
.bottom-nav-item.active{color:var(--blue);}
@media(max-width:768px){
  .sidebar{display:none;}
  .main-content{margin-left:0;padding-bottom:70px;}
  .bottom-nav{display:flex;}

.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:700;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}

.s-go{background:#1a4731;color:#3fb950;}
.s-nurse{background:#3d2b00;color:#ffa657;}
.s-half{background:#2d1b00;color:#d29922;}
.s-cant{background:#3d1515;color:#f85149;}
.s-later{background:#2b1f3d;color:#bc8cff;}
.s-book{background:#0d2149;color:#58a6ff;}
.s-sign{background:#0d3149;color:#39d353;}
.s-wait2{background:#1a2a3d;color:#79c0ff;}
.s-approve{background:#132d18;color:#3fb950;}
.s-close{background:#21262d;color:#6e7681;}
.s-reject{background:#3d0a0a;color:#f85149;}
.s-release{background:#0a2418;color:#3fb950;}
.s-other{background:#2d1500;color:#ffa657;}
.s-throw{background:#21262d;color:#6e7681;}

.mk-stat-num{font-size:26px;font-weight:800;line-height:1;}
.mk-stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.mk-body{display:flex;flex:1;gap:0;}
.mk-cards-area{flex:1;padding:20px;min-width:0;}
.mk-sidebar{width:280px;flex-shrink:0;border-left:1px solid var(--border);padding:16px;background:var(--bg2);}
.mk-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.mkc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:default;}
.mkc:hover{border-color:var(--blue2);box-shadow:0 4px 20px rgba(31,111,235,.15);}
.mkc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mkc-id{font-size:15px;font-weight:800;color:var(--blue);}
.mkc-date{font-size:11px;background:#2d2000;color:var(--yellow);padding:3px 8px;border-radius:20px;border:1px solid #4a3500;}
.mkc-name{font-size:15px;font-weight:700;margin-bottom:8px;}
.mkc-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mkc-contact{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mkc-report{font-size:12px;color:var(--text2);background:var(--bg3);padding:8px 10px;border-radius:6px;margin-bottom:12px;line-height:1.6;max-height:72px;overflow:hidden;}
.mkc-actions{display:flex;gap:8px;}
.btn-claim{flex:1;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-claim:hover{background:#388bfd;transform:translateY(-1px);}
.btn-claim:disabled{background:#1a3a5c;color:#4a7ab5;cursor:not-allowed;transform:none;}
.btn-skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;}

.mk-sb-section{margin-bottom:20px;}
.mk-sb-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}

/* Loading */

.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--border);}
</style>
</head>

function getStatusClass(s){
  const m={'รอข้อมูล':'s-wait','ไปต่อได้':'s-go','เคสเลี้ยง':'s-nurse','เคสวัด 50/50':'s-half','ติดต่อไม่ได้':'s-cant','ยังไม่สะดวก':'s-later','จอง':'s-book','รอเซ็นต์':'s-sign','รอผล':'s-wait2','อนุมัติ':'s-approve','ปิดเคส':'s-close','รีเจค':'s-reject','ปล่อยแล้ว':'s-release','ได้รถจากที่อื่น':'s-other','โยนเคส':'s-throw','จองแล้ว':'s-book'};
  return m[s]||'s-wait';

// ============================================================
// API
// ============================================================
async function api(action, data={}) {
  if(!API_URL) {
    // Demo mode
    return demoApi(action, data);
  }
  const isGet = ['getCases','getMarket','getUsers','getBookings','getDashboard','getHistory','getNotifications','getClaimedCases','searchCases'].includes(action);
  try {
    let url, opts;
    if(isGet) {
      const q=new URLSearchParams({action,...data}).toString();
      url=API_URL+'?'+q;
      opts={method:'GET',redirect:'follow',mode:'cors'};
    } else {
      url=API_URL+'?action='+action;
      opts={method:'POST',redirect:'follow',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)};
    }
    const r=await fetch(url, opts);
    const text=await r.text();
    try{return JSON.parse(text);}catch(e){return {success:false,error:'Parse error: '+text.slice(0,100)};}
  } catch(e) {
    return {success:false,error:e.toString()};
  }
}

function demoApi(action, data){
  switch(action){
    case 'login': {
      const u=DEMO.users.find(x=>x.username===data.username&&x.password===data.password&&x.status==='active');
      if(!u) return {success:false,error:'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'};
      return {success:true,user:{...u}};
    }
    case 'getUsers': return {success:true,data:DEMO.users};
    case 'getCases': return {success:true,data:data.sales&&data.sales!=='all'?DEMO.cases.filter(c=>c.sales===data.sales):DEMO.cases};
    case 'addCase': {
      const d=new Date(),yy=String(d.getFullYear()).slice(-2),mm=String(d.getMonth()+1).padStart(2,'0');
      const pre=yy+mm,max=DEMO.cases.filter(c=>String(c.caseid).startsWith(pre)).reduce((m,c)=>{const n=parseInt(String(c.caseid).slice(4))||0;return n>m?n:m;},0);
      const id=pre+String(max+1).padStart(3,'0');
      DEMO.cases.push({caseid:id,...data,createdat:new Date().toLocaleString('th-TH'),updatedat:new Date().toLocaleString('th-TH')});
      return {success:true,caseId:id};
    }
    case 'updateCase': {
      const idx=DEMO.cases.findIndex(c=>String(c.caseid)===String(data.caseid));
      if(idx>=0) Object.assign(DEMO.cases[idx],data,{updatedat:new Date().toLocaleString('th-TH')});
      return {success:true};
    }
    case 'searchCases': {
      const q=(data.q||'').toLowerCase();
      return {success:true,data:DEMO.cases.filter(c=>String(c.caseid).toLowerCase().includes(q)||String(c.customername).toLowerCase().includes(q)||String(c.contact).toLowerCase().includes(q))};
    }
    case 'getMarket': {
      let r=[...DEMO.market].filter(x=>x.PoolStatus!=='ปิด');
      if(data.sales) r=r.filter(x=>!x.ExpiredSales||!x.ExpiredSales.split(',').includes(data.sales));
      return {success:true,data:r};
    }
    case 'sendToMarket': {
      const c=DEMO.cases.find(x=>String(x.caseid)===String(data.caseId));
      const ex=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(!ex&&c) DEMO.market.push({ID:data.caseId,name:c.customername,contact_by:'',contact:c.contact,report:c.report,status:c.status,old_sales:data.sales,ExpiredSales:data.sales,PoolStatus:'เปิด'});
      else if(ex) ex.PoolStatus='เปิด';
      return {success:true};
    }
    case 'closeMarketCase': {
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(mk) mk.PoolStatus='ปิด';
      return {success:true};
    }
    case 'claimCase': {
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(!mk||mk.PoolStatus!=='เปิด') return {success:false,error:'เคสถูกรับไปแล้ว'};
      mk.PoolStatus='ปิด';
      DEMO.claimedcases.push({caseID:data.caseId,customername:mk.name,contact:mk.contact,report:mk.report,status:mk.status,fromsales:mk.old_sales,sale:data.sales,date:new Date().toLocaleString('th-TH'),newstatus:mk.status,AssignedAt:new Date().toLocaleString('th-TH'),Notes:''});
      return {success:true};
    }
    case 'getClaimedCases': return {success:true,data:data.sales?DEMO.claimedcases.filter(c=>c.sale===data.sales):DEMO.claimedcases};
    case 'updateClaimed': {
      const idx=DEMO.claimedcases.findIndex(c=>String(c.caseID)===String(data.caseId));
      if(idx>=0) Object.assign(DEMO.claimedcases[idx],{newstatus:data.newstatus,Notes:data.Notes});
      return {success:true};
    }
    case 'returnCase': {
      const idx=DEMO.claimedcases.findIndex(c=>String(c.caseID)===String(data.caseId)&&c.sale===data.sales);
      if(idx>=0) DEMO.claimedcases.splice(idx,1);
      const mk=DEMO.market.find(x=>String(x.ID)===String(data.caseId));
      if(mk){const exp=(mk.ExpiredSales||'').split(',').filter(Boolean);if(!exp.includes(data.sales))exp.push(data.sales);mk.ExpiredSales=exp.join(',');mk.PoolStatus='เปิด';}
      return {success:true};
    }
    case 'getBookings': return {success:true,data:data.sales?DEMO.bookings.filter(b=>b['เซลส์']===data.sales):DEMO.bookings};
    case 'addBooking': DEMO.bookings.push({'วันที่':new Date().toLocaleString('th-TH'),CaseID:data.caseId,'เซลส์':data.sales,'ลูกค้า':data.customer,Facebook:data.facebook||'',Ads:data.ads||'','รถ':data.brand||'','รุ่น':data.model||'','ทะเบียน':data.plate||'','สถานะ':data.status||'จองแล้ว','หมายเหตุ':data.note||''}); return {success:true};
    case 'updateBooking': {
      const idx=DEMO.bookings.findIndex(b=>String(b.CaseID)===String(data.caseId));
      if(idx>=0) Object.assign(DEMO.bookings[idx],{'สถานะ':data.status,'หมายเหตุ':data.note});
      return {success:true};
    }
    case 'getDashboard': {
      const d2=new Date(),pre=String(d2.getFullYear()).slice(-2)+String(d2.getMonth()+1).padStart(2,'0');
      const sales=DEMO.users.filter(u=>u.role==='Sales');
      if(data.role==='Admin'){
        return {success:true,data:{sales:sales.map(u=>{const my=DEMO.cases.filter(c=>c.sales===u.name&&String(c.caseid).startsWith(pre));return {name:u.name,avatar:u.avatar,currentCases:my.length,claimedCases:DEMO.claimedcases.filter(c=>c.sale===u.name).length,sold:my.filter(c=>c.status==='ปล่อยแล้ว').length,statuses:{}};}),total:{cases:DEMO.cases.filter(c=>String(c.caseid).startsWith(pre)).length}}};
      }
      const my=DEMO.cases.filter(c=>c.sales===data.sales&&String(c.caseid).startsWith(pre));
      return {success:true,data:{currentCases:my.length,claimedCases:DEMO.claimedcases.filter(c=>c.sale===data.sales).length,sold:my.filter(c=>c.status==='ปล่อยแล้ว').length,statuses:{}}};
    }
    case 'getHistory': return {success:true,data:data.caseId?DEMO.history.filter(h=>String(h['รหัสเคส'])===String(data.caseId)):DEMO.history};
    case 'getNotifications': return {success:true,data:data.sales?DEMO.notifications.filter(n=>n['เซลส์']===data.sales):DEMO.notifications};
    case 'markNotifRead': {const idx=DEMO.notifications.findIndex(n=>n.notifId===data.notifId);if(idx>=0)DEMO.notifications[idx]['สถานะ']='read';return {success:true};}
    case 'adminPullCase': case 'adminChangeSales': {const idx=DEMO.cases.findIndex(c=>String(c.caseid)===String(data.caseId));if(idx>=0)DEMO.cases[idx].sales=data.newSales;return {success:true};}
    default: return {success:true,data:[]};
  }
}

function CaseModal({caseData,users,currentUser,onClose,onUpdated}){

  const [report,setReport]=useState(caseData.report||'');
  const [editReport,setEditReport]=useState(false);

  const [loading,setLoading]=useState(false);
  const [showHistory,setShowHistory]=useState(false);

  const isClaimed=!!caseData.fromsales;
  const caseId=caseData.caseid||caseData.caseID;

  async function save(){
    setLoading(true);
    if(isClaimed){
      await api('updateClaimed',{caseId,newstatus:status,Notes:note,sales:currentUser.name});

      await api('updateCase',{caseid:caseId,status,report:editReport?report:undefined,changedBy:currentUser.name,detail:`เปลี่ยนสถานะเป็น ${status}`});

    setLoading(false);
    onUpdated();onClose();

  async function changeSales(){
    if(!newSales)return;
    setLoading(true);
    await api('adminChangeSales',{caseId,newSales});
    setLoading(false);
    onUpdated();onClose();
  }

  async function sendToMarket(){
    setLoading(true);
    await api('sendToMarket',{caseId,sales:caseData.sales||currentUser.name});
    setLoading(false);
    onUpdated();onClose();
  }

  return <>
    <Modal title={`เคส ${caseId}`} onClose={onClose} footer={<>
      {showHistory&&<button className="btn btn-ghost" onClick={()=>setShowHistory(false)} style={{marginRight:'auto'}}>← กลับ</button>}
      {!showHistory&&<>
        <button className="btn btn-ghost" onClick={()=>setShowHistory(true)} style={{gap:6,display:'flex',alignItems:'center'}}><Ico.history/> ประวัติ</button>
        {!isClaimed&&<button className="btn btn-ghost" onClick={sendToMarket} style={{color:'var(--yellow)'}}>⬆ ส่งตลาด</button>}
        <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'กำลังบันทึก...':'💾 บันทึก'}</button>
      </>}
    </>}>
      {showHistory?<HistoryModal caseId={caseId} onClose={()=>setShowHistory(false)}/>:<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div><div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>รหัสเคส</div><div style={{fontWeight:700,color:'var(--blue)'}}>{caseId}</div></div>
          <div><div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>ชื่อลูกค้า</div><div style={{fontWeight:600}}>{caseData.customername||caseData.name||'-'}</div></div>
          <div style={{gridColumn:'1/-1'}}><div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>ติดต่อ / QR</div>
            {(caseData.contact||'').startsWith('http')||(caseData.contact||'').startsWith('data:image')?
              <div>
                {isClaimed?<img src={caseData.contact} alt="QR" style={{maxWidth:'100%',maxHeight:180,borderRadius:8,border:'1px solid var(--border)'}}/>:
                <div style={{background:'var(--bg3)',padding:8,borderRadius:8,textAlign:'center',color:'var(--text2)',fontSize:12}}>🔒 รับเคสก่อนเพื่อดู QR Code</div>}
              </div>:
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontWeight:600,color:'var(--green)',filter:isClaimed?'blur(0)':'blur(4px)'}}>{caseData.contact||'-'}</span>
                {isClaimed&&<button className="btn btn-ghost" style={{padding:'2px 6px',fontSize:12}} onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(caseData.contact);}}><Ico.copy/></button>}
              </div>
            }
          </div>
          <div><div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>เซลส์</div><div style={{fontWeight:600,color:'var(--purple)'}}>{caseData.sales||caseData.sale||'-'}</div></div>
          {isClaimed&&<div><div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>รับมาจาก</div><div style={{fontWeight:600,color:'var(--orange)'}}>{caseData.fromsales||'-'}</div></div>}
        </div>
        <div className="form-group">
          <label>สถานะ</label>
          <select value={status} onChange={e=>setStatus(e.target.value)}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}

        <div className="form-group">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <label style={{margin:0}}>รีพอร์ต</label>
            {!isClaimed&&<button className="btn btn-ghost" style={{padding:'2px 8px',fontSize:12}} onClick={()=>setEditReport(!editReport)}>{editReport?'ยกเลิก':'✏️ แก้ไข'}</button>}

        </div>
        {isClaimed&&<div className="form-group"><label>โน้ต</label><textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}/></div>}
        {isAdmin&&!isClaimed&&<div className="form-group">

          <div style={{display:'flex',gap:8}}>
            <select value={newSales} onChange={e=>setNewSales(e.target.value)}>
              <option value="">-- เลือกเซลส์ --</option>
              {users.filter(u=>u.role==='Sales').map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}
            </select>
            <button className="btn btn-ghost" onClick={changeSales} disabled={!newSales}>เปลี่ยน</button>
          </div>
        </div>}
      </>}
    </Modal>
  </>;
}

// QR UPLOADER COMPONENT
// ============================================================
function QrUploader({value,onChange}){
  const [uploading,setUploading]=useState(false);
  const [preview,setPreview]=useState(value||'');
  const fileRef=React.useRef();

  async function handleFile(e){
    const file=e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')) return alert('กรุณาเลือกไฟล์รูปภาพเท่านั้น');
    if(file.size>5*1024*1024) return alert('ไฟล์ต้องไม่เกิน 5MB');
    setUploading(true);
    try {
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        const base64=ev.target.result;
        setPreview(base64); // show preview immediately
        if(API_URL){
          const r=await api('uploadImage',{base64,mimeType:file.type,filename:file.name});
          if(r.success){
            onChange(r.url);
            setPreview(r.url);
          } else {
            // Fallback: store base64 directly (for demo/testing)
            onChange(base64);
            alert('อัปโหลดไปยัง Drive ไม่สำเร็จ เก็บเป็น base64 แทน: '+r.error);
          }
        } else {
          // Demo mode: store base64
          onChange(base64);
        }
        setUploading(false);
      };
      reader.readAsDataURL(file);
    } catch(err){
      setUploading(false);
      alert('เกิดข้อผิดพลาด: '+err);
    }
  }

  function handlePaste(e){
    const items=e.clipboardData?.items||[];
    for(const item of items){
      if(item.type.startsWith('image/')){
        const file=item.getAsFile();
        if(file) handleFile({target:{files:[file]}});
      }
    }
  }

  return <div onPaste={handlePaste}>
    <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} capture="environment"/>
    {preview?
      <div style={{position:'relative',display:'inline-block',width:'100%'}}>
        <img src={preview} alt="QR Code" style={{width:'100%',maxHeight:200,objectFit:'contain',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)'}}/>
        <button onClick={()=>{setPreview('');onChange('');}} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.6)',border:'none',borderRadius:'50%',width:24,height:24,color:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>:
      <div style={{display:'flex',gap:8,flexDirection:'column'}}>
        <button type="button" className="btn btn-ghost" style={{width:'100%',padding:'14px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:'2px dashed var(--border)',borderRadius:8}} onClick={()=>fileRef.current.click()} disabled={uploading}>
          {uploading?<><span className="spin" style={{width:20,height:20,marginRight:0}}/><span style={{fontSize:13}}>กำลังอัปโหลด...</span></>:<><span style={{fontSize:28}}>📷</span><span style={{fontSize:13}}>แตะเพื่อถ่ายรูป / เลือกรูป QR Code</span><span style={{fontSize:11,color:'var(--text3)'}}>รองรับ JPG, PNG ไม่เกิน 5MB</span></>}
        </button>
        <input value={value||''} onChange={e=>onChange(e.target.value)} placeholder="หรือวาง URL รูปภาพ / ไอดีไลน์" style={{fontSize:13}}/>
      </div>
    }
  </div>;
}

function AddCaseModal({users,currentUser,onClose,onAdded}){
  const [form,setForm]=useState({customername:'',contact:'',contact_by:'ไลน์',report:'',status:'รอข้อมูล',sales:currentUser.role==='Admin'?'':currentUser.name,sent:'ปกติ'});
  const [loading,setLoading]=useState(false);
  const [previewId,setPreviewId]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    // Generate preview case ID
    const d=new Date();
    const yy=String(d.getFullYear()).slice(-2);
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const pre=yy+mm;
    api('getCases',{all:'true'}).then(r=>{

        const max=(r.data||[]).filter(c=>String(c.caseid).startsWith(pre)).reduce((m,c)=>{const n=parseInt(String(c.caseid).slice(4))||0;return n>m?n:m;},0);

function NotifPanel({user,onClose,onCountChange}){
  const [notifs,setNotifs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{api('getNotifications',{sales:user.name}).then(r=>{if(r.success)setNotifs(r.data||[]);setLoading(false);});},[]);
  async function markRead(id){
    await api('markNotifRead',{notifId:id});
    const updated=notifs.map(x=>x.notifId===id?{...x,'สถานะ':'read'}:x);
    setNotifs(updated);
    if(onCountChange)onCountChange(updated.filter(n=>n['สถานะ']==='unread').length);
  }
  async function markAllRead(){
    const unread=notifs.filter(n=>n['สถานะ']==='unread');
    for(const n of unread) await api('markNotifRead',{notifId:n.notifId});
    setNotifs(prev=>prev.map(x=>({...x,'สถานะ':'read'})));
    if(onCountChange)onCountChange(0);
  }
  return <div style={{position:'fixed',top:56,right:16,width:320,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,boxShadow:'var(--shadow)',zIndex:200,maxHeight:420,overflowY:'auto'}}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontWeight:700}}>การแจ้งเตือน</span>
      <div style={{display:'flex',gap:6}}>
        <button className="btn btn-ghost" style={{padding:'2px 8px',fontSize:11}} onClick={markAllRead}>อ่านทั้งหมด</button>
        <button className="btn btn-ghost" style={{padding:'2px 8px'}} onClick={onClose}><Ico.x/></button>
      </div>
    </div>
    {loading?<Loading/>:notifs.length===0?<p style={{padding:20,textAlign:'center',color:'var(--text2)',fontSize:13}}>ไม่มีการแจ้งเตือน</p>:
    notifs.slice(0,30).map(n=><div key={n.notifId} style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',background:n['สถานะ']==='unread'?'rgba(88,166,255,.06)':'transparent',cursor:'pointer'}} onClick={()=>markRead(n.notifId)}>
      <div style={{fontSize:13,display:'flex',gap:8,alignItems:'flex-start'}}>
        {n['สถานะ']==='unread'&&<span style={{width:7,height:7,borderRadius:'50%',background:'var(--blue)',flexShrink:0,marginTop:4}}/>}
        <span style={{color:n['สถานะ']==='unread'?'var(--text)':'var(--text2)'}}>{n.message}</span>
      </div>
      <div style={{fontSize:11,color:'var(--text3)',marginTop:3,paddingLeft:n['สถานะ']==='unread'?15:0}}>{String(n['วันที่']||'')}</div>
    </div>)}
  </div>;
}

// ============================================================
function AdminCurrentCases({currentUser,users}){
  const [cases,setCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState({sales:'all',status:'',q:''});
  const [sortDir,setSortDir]=useState('desc'); // desc=ใหม่สุดก่อน, asc=เก่าสุดก่อน
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showAddBook,setShowAddBook]=useState(false);

  const load=useCallback(()=>{
    setLoading(true);
    api('getCases',{}).then(r=>{if(r.success)setCases(r.data||[]);setLoading(false);});
  },[]);
  useEffect(()=>{load();},[load]);

  async function search(){
    if(!filter.q){load();return;}
    setLoading(true);
    const r=await api('searchCases',{q:filter.q});
    if(r.success)setCases(r.data||[]);
    setLoading(false);
  }

  const filtered=cases.filter(c=>{
    if(filter.sales!=='all'&&c.sales!==filter.sales)return false;
    if(filter.status&&c.status!==filter.status)return false;
    return true;
  }).sort((a,b)=>{
    const av=String(a.caseid||''), bv=String(b.caseid||'');
    return sortDir==='desc'?bv.localeCompare(av):av.localeCompare(bv);
  });

  const salesList=users.filter(u=>u.role==='Sales');

  return <div className="page">
    <div className="page-hd">
      <div><div className="page-title">📋 เคสปัจจุบัน</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>เดือนนี้ทั้งหมด {filtered.length} เคส</div></div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost" onClick={()=>setShowAddBook(true)}>📋 เพิ่มจอง</button>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Ico.plus/> เพิ่มลูกค้า</button>
      </div>
    </div>
    <div className="search-bar" style={{marginBottom:16}}>
      <div style={{position:'relative',flex:1,maxWidth:280}}>
        <input value={filter.q} onChange={e=>setFilter(f=>({...f,q:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="🔍 ค้นหาชื่อ เบอร์ รหัสเคส"/>
      </div>
      <button className="btn btn-ghost" onClick={search}><Ico.search/> ค้นหา</button>
      <select value={filter.sales} onChange={e=>setFilter(f=>({...f,sales:e.target.value}))} style={{minWidth:100}}>
        <option value="all">ทุกเซลส์</option>
        {salesList.map(u=><option key={u.userId} value={u.name}>{u.name}</option>)}
      </select>
      <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))} style={{minWidth:120}}>
        <option value="">ทุกสถานะ</option>
        {STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <button className="btn btn-ghost" onClick={load}>🔄</button>
    </div>
    <div className="card" style={{padding:0}}>
      <div className="table-wrap">
        <table>
          <thead><tr>
            <th onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
              รหัสเคส {sortDir==='desc'?'↓':'↑'}
            </th>
            <th>ชื่อลูกค้า</th><th>ติดต่อ</th><th>สถานะ</th><th>เซลส์</th><th>อัปเดตล่าสุด</th></tr></thead>
          <tbody>
            {loading?<tr><td colSpan={6}><Loading/></td></tr>:
            filtered.length===0?<tr><td colSpan={6} style={{textAlign:'center',padding:30,color:'var(--text2)'}}>ไม่พบเคส</td></tr>:
            filtered.map((c,i)=><tr key={i} className="clickable" onClick={()=>setSel(c)}>
              <td><span style={{color:'var(--blue)',fontWeight:700}}>{c.caseid}</span></td>
              <td style={{fontWeight:500}}>{c.customername}</td>
              <td style={{fontSize:13,color:'var(--text2)'}}>{c.contact||'-'}</td>
              <td><StatusBadge status={c.status}/></td>
              <td><span style={{color:'var(--purple)'}}>{c.sales}</span></td>
              <td style={{fontSize:12,color:'var(--text3)'}}>{String(c.updatedat||'').split(' ')[0]}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
    {sel&&<CaseModal caseData={sel} users={users} currentUser={currentUser} onClose={()=>setSel(null)} onUpdated={load}/>}
    {showAdd&&<AddCaseModal users={users} currentUser={currentUser} onClose={()=>setShowAdd(false)} onAdded={load}/>}
    {showAddBook&&<AddBookingModal currentUser={currentUser} users={users} onClose={()=>setShowAddBook(false)} onAdded={()=>{}}/>}
  </div>;
}

function SalesMarket({currentUser}){
  const [cases,setCases]=useState([]);
  const [claimedCases,setClaimedCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [claiming,setClaiming]=useState(null);
  const [msg,setMsg]=useState('');
  const [dashboard,setDashboard]=useState(null);
  const [leaderboard,setLeaderboard]=useState([]);

  const load=useCallback(()=>{
    setLoading(true);
    Promise.all([
      api('getMarket',{sales:currentUser.name}),
      api('getClaimedCases',{sales:currentUser.name}),
      api('getDashboard',{role:'Admin'})
    ]).then(([mr,cr,dr])=>{
      if(mr.success)setCases((mr.data||[]).filter(c=>c.old_sales!==currentUser.name));
      if(cr.success)setClaimedCases(cr.data||[]);
      if(dr.success){setLeaderboard(dr.data?.sales||[]);}
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  async function claim(caseId){
    setClaiming(caseId);
    const r=await api('claimCase',{caseId,sales:currentUser.name});
    setClaiming(null);
    if(r.success){setMsg('✅ รับเคสสำเร็จ! ตรวจสอบได้ที่หน้า "รับจากตลาด"');load();setTimeout(()=>setMsg(''),4000);}
    else{setMsg('❌ '+r.error);setTimeout(()=>setMsg(''),3000);}
  }

  async function notInterested(caseId){
    await api('returnCase',{caseId,sales:'_skip_'+currentUser.name});
    load();
  }

  function getDateBadge(c){
    const id=String(c.ID||'');
    if(id.length>=4){const yy=id.slice(0,2),mm=id.slice(2,4);return `25${yy} (พ.ศ.${parseInt('25'+yy)+543-2500})`;}
    return '';
  }

  const myStats=leaderboard.find(s=>s.name===currentUser.name)||{};
  const totalInMarket=cases.length;
  const myClaimed=claimedCases.length;

  // Leaderboard sorted by claimed
  const lbSorted=[...leaderboard].sort((a,b)=>(b.claimedCases||0)-(a.claimedCases||0));

  return <div className="mk-page">
    {/* Hero Header */}
    <div className="mk-hero">
      <div className="mk-hero-top">
        <div>
          <div style={{fontSize:20,fontWeight:800,display:'flex',alignItems:'center',gap:8}}>🎯 ตลาดเคส</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>เลือกลูกค้าที่ใช่คนดูแล — ใครไวได้ก่อน</div>
        </div>
        <button className="btn btn-ghost" onClick={load} style={{fontSize:13}}>🔄</button>
      </div>
      <div className="mk-stats">
        {[
          ['ว่างอยู่',totalInMarket,'var(--blue)'],
          ['มีเจ้าของแล้ว',0,'var(--orange)'],
          ['ของฉัน',myClaimed,'var(--green)'],
          ['ทั้งหมด',totalInMarket,'var(--text)']
        ].map(([l,v,c])=>
          <div key={l} className="mk-stat"><div className="mk-stat-num" style={{color:c}}>{v}</div><div className="mk-stat-lbl">{l}</div></div>
        )}
      </div>
    </div>

    <div className="mk-body">
      {/* Cards Area */}
      <div className="mk-cards-area">
        {msg&&<div style={{background:msg.startsWith('✅')?'rgba(63,185,80,.1)':'rgba(248,81,73,.1)',border:`1px solid ${msg.startsWith('✅')?'var(--green)':'var(--red)'}`,padding:'10px 16px',borderRadius:8,marginBottom:14,fontSize:13}}>{msg}</div>}
        {loading?<Loading/>:cases.length===0?
        <div style={{textAlign:'center',padding:60,color:'var(--text2)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📭</div>
          <div style={{fontSize:16,fontWeight:600}}>ไม่มีเคสในตลาดสำหรับคุณ</div>
          <div style={{fontSize:13,marginTop:8}}>รอเคสใหม่เข้ามา หรือเช็คอีกครั้งในภายหลัง</div>
        </div>:
        <>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>พบ {cases.length} เคส ที่รอคนดูแล</div>
          <div className="mk-cards-grid">
            {cases.map((c,i)=><div key={i} className="mkc">
              <div className="mkc-top">
                <span className="mkc-id">{c.ID}</span>
                <span className="mkc-date">📅 {getDateBadge(c)}</span>
              </div>
              <div className="mkc-name">{c.name}</div>
              <div className="mkc-badges">
                <StatusBadge status={c.status}/>
                <span className="badge" style={{background:'rgba(255,166,87,.1)',color:'var(--orange)',border:'1px solid rgba(255,166,87,.3)',fontSize:11}}>เคสจาก {c.old_sales||'-'}</span>
              </div>
              <div className="mkc-contact">
                📞 <span style={{filter:'blur(5px)',userSelect:'none',letterSpacing:1}}>••••••••••</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>(เห็นหลังรับเคส)</span>
              </div>
              {c.report&&<div className="mkc-report">{String(c.report).slice(0,130)}{c.report.length>130?'...':''}</div>}
              <div className="mkc-actions">
                <button className="btn-claim" onClick={()=>claim(c.ID)} disabled={claiming===c.ID}>
                  {claiming===c.ID?'⏳ กำลังรับ...':'รับเคสนี้ →'}
                </button>
                <button className="btn-skip" onClick={()=>notInterested(c.ID)} title="ไม่สนใจ">✕</button>
              </div>
            </div>)}
          </div>
        </>}
      </div>

      {/* Sidebar */}
      <div className="mk-sidebar">
        {/* Leaderboard */}
        <div className="mk-sb-section">
          <div className="mk-sb-title">🏆 Leaderboard รับเคส</div>
          {lbSorted.length===0?<div style={{fontSize:12,color:'var(--text2)',textAlign:'center',padding:'12px 0'}}>ยังไม่มีข้อมูล</div>:
          lbSorted.map((s,i)=><div key={i} className="lb-row">
            <div className="lb-rank" style={{background:i===0?'#3d2a00':i===1?'#1c1c2e':i===2?'#1a2a00':'var(--bg3)',color:i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text2)'}}>
              {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:s.name===currentUser.name?700:500,fontSize:13,color:s.name===currentUser.name?'var(--blue)':'var(--text)'}}>{s.name}{s.name===currentUser.name?' (ฉัน)':''}</div>
            </div>
            <span style={{fontWeight:700,color:'var(--blue)',fontSize:14}}>{s.claimedCases||0}</span>
          </div>)}
        </div>

        {/* My Stats */}
        <div className="mk-sb-section">
          <div className="mk-sb-title">📊 สถิติของฉัน</div>
          <div style={{display:'flex',flex:1,flexDirection:'column',gap:6}}>
            {[
              ['เคสที่รับไปแล้ว',myClaimed,'var(--blue)'],
              ['ปล่อยแล้ว',myStats.sold||0,'var(--green)'],
              ['เคสปัจจุบัน',myStats.currentCases||0,'var(--purple)']
            ].map(([l,v,c])=><div key={l} className="sb-stat-row">
              <span style={{fontSize:13}}>{l}</span>
              <span style={{fontWeight:800,fontSize:16,color:c}}>{v}</span>
            </div>)}
          </div>
        </div>
      </div>
    </div>
  </div>;
}

function SalesCurrentCases({currentUser,users}){
  const [cases,setCases]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);

  const CLOSED_STATUSES=['ปิดเคส','รีเจค','ได้รถจากที่อื่น','โยนเคส','ปล่อยแล้ว'];
  const load=useCallback(()=>{
    setLoading(true);
    // ดึงเคสทั้งหมดของตัวเอง แล้ว filter เฉพาะที่ยังไม่ปิด (active)
    api('getCases',{sales:currentUser.name,all:'true'}).then(r=>{
      if(r.success){
        const active=(r.data||[]).filter(c=>!CLOSED_STATUSES.includes(c.status));
        setCases(active);
      }
      setLoading(false);
    });
  },[currentUser.name]);
  useEffect(()=>{load();},[load]);

  return <div className="page">
    <div className="page-hd">
      <div><div className="page-title">📋 เคสของฉัน</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{cases.length} เคส ที่กำลังดูแลอยู่</div></div>
      <button className="btn btn-ghost" onClick={load}>🔄</button>
    </div>
    {loading?<Loading/>:<div>
      {cases.length===0?<div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>ยังไม่มีเคส</div>:
      cases.map((c,i)=><div key={i} className="market-card" onClick={()=>setSel(c)} style={{cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{color:'var(--blue)',fontWeight:700}}>{c.caseid}</span>
          <StatusBadge status={c.status}/>
        </div>
        <div style={{fontWeight:600,marginBottom:4,fontSize:15}}>{c.customername}</div>
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>📞 {c.contact||'-'} · 🕐 {String(c.updatedat||c.createdat||'').split(' ')[0]||'-'}</div>
        {c.report&&<div style={{fontSize:12,color:'var(--text2)',background:'var(--bg3)',padding:'6px 10px',borderRadius:6,marginTop:6,lineHeight:1.5}}>{String(c.report).slice(0,100)}{String(c.report).length>100?'...':''}</div>}
        <div style={{marginTop:10,display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{fontSize:12,padding:'4px 10px',color:'var(--yellow)'}} onClick={e=>{e.stopPropagation();if(window.confirm('ส่งเคส '+c.caseid+' ขึ้นตลาด?'))api('sendToMarket',{caseId:c.caseid,sales:currentUser.name}).then(()=>load());}}>⬆ ส่งตลาด</button>
        </div>
      </div>)}
    </div>}
    {sel&&<CaseModal caseData={sel} users={users} currentUser={currentUser} onClose={()=>setSel(null)} onUpdated={load}/>}
  </div>;
}

        <div className="form-group"><label>รหัสผ่าน</label><input value={form.password} onChange={e=>set('password',e.target.value)}/></div>
        <div className="form-group"><label>ชื่อที่แสดง</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>set('role',e.target.value)}><option>Sales</option><option>Admin</option></select></div>
      </div>
    </Modal>}
  </div>;
}

// ============================================================
// LOGIN PAGE
// ============================================================
function LoginPage({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  async function submit(){
    if(!username||!password)return setError('กรุณากรอกข้อมูลให้ครบ');
    setLoading(true);setError('');
    const r=await api('login',{username,password});
    setLoading(false);
    if(r.success)onLogin(r.user);
    else setError(r.error||'เข้าสู่ระบบไม่สำเร็จ');
  }

  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:16}}>
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:16,padding:32,width:'100%',maxWidth:380,boxShadow:'var(--shadow)'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:8}}>🚗</div>
        <div style={{fontSize:22,fontWeight:800,color:'var(--text)'}}>CasePool</div>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>ระบบจัดการเคสรถยนต์</div>
      </div>
      {!API_URL&&<div style={{background:'rgba(210,153,34,.1)',border:'1px solid var(--yellow)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--yellow)'}}>
        ⚙️ Demo Mode — ยังไม่ได้เชื่อม Google Sheets<br/>ลอง: admin/admin1234 หรือ fab/fab1234
      </div>}
      {error&&<div style={{background:'rgba(248,81,73,.1)',border:'1px solid var(--red)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'var(--red)'}}>{error}</div>}
      <div className="form-group"><label>Username</label><input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="เช่น fab, paint, peer" autoComplete="username"/></div>
      <div className="form-group">
        <label>รหัสผ่าน</label>
        <div style={{position:'relative'}}>
          <input type={showPass?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="current-password"/>
          <button onClick={()=>setShowPass(!showPass)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:14}}>{showPass?'🙈':'👁'}</button>
        </div>
      </div>
      <button className="btn btn-primary" onClick={submit} disabled={loading} style={{width:'100%',padding:'10px',fontSize:15,marginTop:4}}>
        {loading?'⏳ กำลังเข้าสู่ระบบ...':'เข้าสู่ระบบ →'}
      </button>
    </div>
  </div>;
}

// ============================================================
// ADMIN APP
// ============================================================
function AdminApp({currentUser,onLogout}){
  const [page,setPage]=useState('cases');
  const [users,setUsers]=useState([]);
  const [showNotif,setShowNotif]=useState(false);
  const [notifCount,setNotifCount]=useState(0);

  useEffect(()=>{
    api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});
    api('getNotifications',{sales:'admin'}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});
  },[]);

  const pages={cases:<AdminCurrentCases currentUser={currentUser} users={users}/>,market:<AdminMarket currentUser={currentUser} users={users}/>,dashboard:<AdminDashboard currentUser={currentUser}/>,bookings:<AdminBookings currentUser={currentUser} users={users}/>,users:<AdminUsers currentUser={currentUser}/>};

  const navItems=[
    {key:'cases',icon:<Ico.home/>,label:'เคสปัจจุบัน'},
    {key:'market',icon:<Ico.market/>,label:'ตลาดเคส'},
    {key:'dashboard',icon:<Ico.dash/>,label:'แดชบอร์ด'},
    {key:'bookings',icon:<Ico.book/>,label:'การจอง'},
    {key:'users',icon:<Ico.user/>,label:'ผู้ใช้'},
  ];

  return <div>
    <div className="sidebar">
      <div className="sidebar-logo">
        <div style={{fontWeight:800,fontSize:18,color:'var(--blue)'}}>🚗 CasePool</div>
        <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Admin Panel</div>
      </div>
      <nav className="sidebar-nav">
        {navItems.map(n=><div key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>
          {n.icon}<span>{n.label}</span>
        </div>)}
      </nav>
      <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
            {currentUser.avatar?<img src={currentUser.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Ico.user/>}
          </div>
          <div><div style={{fontWeight:600,fontSize:13}}>{currentUser.name}</div><div style={{fontSize:11,color:'var(--text2)'}}>Admin</div></div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12,position:'relative'}} onClick={()=>setShowNotif(!showNotif)}>
            <Ico.bell/>{notifCount>0&&<span style={{position:'absolute',top:2,right:4,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}
          </button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={()=>document.body.classList.toggle('light')} title="เปลี่ยนธีม">🌓</button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={onLogout}><Ico.logout/></button>
        </div>
      </div>
    </div>
    <div className="main-content">{pages[page]||pages.cases}</div>
    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

// ============================================================
// SALES APP
// ============================================================
function SalesApp({currentUser,onLogout}){
  const [page,setPage]=useState('market');
  const [users,setUsers]=useState([]);
  const [showNotif,setShowNotif]=useState(false);
  const [notifCount,setNotifCount]=useState(0);

  useEffect(()=>{
    api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});
    function refreshNotif(){api('getNotifications',{sales:currentUser.name}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});}
    refreshNotif();
    const t=setInterval(refreshNotif,30000);
    return ()=>clearInterval(t);
  },[currentUser.name]);

  const pages={market:<SalesMarket currentUser={currentUser}/>,cases:<SalesCurrentCases currentUser={currentUser} users={users}/>,claimed:<SalesClaimedCases currentUser={currentUser} users={users}/>,dashboard:<SalesDashboard currentUser={currentUser}/>};

  const navItems=[
    {key:'market',icon:<Ico.market/>,label:'ตลาด'},
    {key:'cases',icon:<Ico.home/>,label:'เคสของฉัน'},
    {key:'claimed',icon:<Ico.inbox/>,label:'รับจากตลาด'},
    {key:'dashboard',icon:<Ico.dash/>,label:'แดชบอร์ด'},
  ];

  // Top bar
  return <div>
    <div style={{position:'fixed',top:0,left:0,right:0,height:56,background:'var(--bg2)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',zIndex:50}}>
      <div style={{fontWeight:800,color:'var(--blue)'}}>🚗 CasePool</div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:14,color:'var(--text2)'}}>{currentUser.name}</div>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={()=>{document.body.classList.toggle('light');}} title="เปลี่ยนธีม">🌓</button>
        <button className="btn btn-ghost" style={{padding:'4px 8px',position:'relative'}} onClick={()=>setShowNotif(!showNotif)}>
          <Ico.bell/>
          {notifCount>0&&<span style={{position:'absolute',top:0,right:0,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}
        </button>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={onLogout}><Ico.logout/></button>
      </div>
    </div>
    <div style={{paddingTop:56}}>{pages[page]||pages.market}</div>
    <div className="bottom-nav">
      {navItems.map(n=><div key={n.key} className={`bottom-nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>
        {n.icon}<span>{n.label}</span>
      </div>)}
    </div>
    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

// ============================================================
// ROOT APP
// ============================================================
function App(){
  const [user,setUser]=useState(()=>{
    try{const s=sessionStorage.getItem('casepool_user');return s?JSON.parse(s):null;}catch{return null;}
  });

  function handleLogin(u){
    sessionStorage.setItem('casepool_user',JSON.stringify(u));
    setUser(u);
  }
  function handleLogout(){
    sessionStorage.removeItem('casepool_user');
    setUser(null);
  }

  if(!user) return <LoginPage onLogin={handleLogin}/>;
  if(user.role==='Admin') return <AdminApp currentUser={user} onLogout={handleLogout}/>;
  return <SalesApp currentUser={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
